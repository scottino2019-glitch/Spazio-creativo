<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocknote</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, #f4f1e8 0%, #e8dcc0 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #faf8f3;
            border: 3px solid #8b4513;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(139, 69, 19, 0.3);
            overflow: hidden;
        }
        
        @media (max-width: 480px) {
            .container {
                border-radius: 0;
                border-left: none;
                border-right: none;
                margin: -20px;
                min-height: 100vh;
            }
        }
        
        .header {
            background: linear-gradient(135deg, #8b4513 0%, #a0522d 100%);
            color: #faf8f3;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #654321;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .header {
                padding: 15px;
            }
        }
        
        .header p {
            font-style: italic;
            opacity: 0.9;
        }
        
        .main-content {
            padding: 30px;
            min-height: 500px;
        }
        
        @media (max-width: 480px) {
            .main-content {
                padding: 15px;
            }
        }
        
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        @media (max-width: 480px) {
            .notes-grid {
                grid-template-columns: 1fr;
                gap: 15px;
                margin-top: 15px;
            }
        }
        
        .note-card {
            background: #ffffff;
            border: 2px solid #8b4513;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }
        
        @media (max-width: 480px) {
            .note-card {
                padding: 12px;
                border-radius: 8px;
            }
        }
        
        .note-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(139, 69, 19, 0.4);
            border-color: #654321;
        }
        
        .note-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #654321;
            margin-bottom: 8px;
            border-bottom: 1px solid #8b4513;
            padding-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(139, 69, 19, 0.1);
        }
        
        .note-preview {
            font-size: 1rem;
            line-height: 1.4;
            margin-bottom: 12px;
            max-height: 60px;
            overflow: hidden;
            position: relative;
            color: #333333;
            background: #fafafa;
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid #8b4513;
        }
        
        .note-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            position: relative;
            z-index: 10;
        }
        
        @media (max-width: 480px) {
            .note-actions {
                gap: 6px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
        
        .btn {
            padding: 6px 12px;
            border: 2px solid #8b4513;
            border-radius: 6px;
            background: #f4f1e8;
            color: #8b4513;
            font-family: 'Crimson Text', serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            position: relative;
            z-index: 20;
        }
        
        @media (max-width: 480px) {
            .btn {
                padding: 10px 14px;
                font-size: 0.85rem;
                min-height: 44px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }
        
        .btn:hover {
            background: #8b4513;
            color: #faf8f3;
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: #8b4513;
            color: #faf8f3;
            font-size: 1.2rem;
            padding: 12px 24px;
            margin-bottom: 20px;
        }
        
        .btn-primary:hover {
            background: #654321;
        }
        
        .btn-danger {
            border-color: #dc3545;
            color: #dc3545;
        }
        
        .btn-danger:hover {
            background: #dc3545;
            color: white;
        }
        
        .editor-container {
            display: none;
        }
        
        .editor-toolbar {
            background: #f4f1e8;
            border: 2px solid #d2b48c;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            padding: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        @media (max-width: 480px) {
            .editor-toolbar {
                padding: 10px;
                gap: 8px;
                justify-content: center;
            }
        }
        
        .editor-content {
            border: 2px solid #d2b48c;
            border-top: none;
            border-radius: 0 0 10px 10px;
            min-height: 300px;
            padding: 20px;
            font-family: 'Crimson Text', serif;
            font-size: 1.1rem;
            line-height: 1.6;
            background: white;
            outline: none;
        }
        
        .toolbar-btn {
            padding: 8px 12px;
            border: 1px solid #8b4513;
            border-radius: 5px;
            background: white;
            color: #8b4513;
            font-family: 'Crimson Text', serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        @media (max-width: 480px) {
            .toolbar-btn {
                padding: 12px 16px;
                min-height: 44px;
                min-width: 44px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }
        
        .toolbar-btn:hover, .toolbar-btn.active {
            background: #8b4513;
            color: white;
        }
        
        .editor-actions {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        @media (max-width: 480px) {
            .editor-actions {
                flex-direction: column;
                gap: 12px;
                margin-top: 15px;
            }
        }
        
        .empty-state {
            text-align: center;
            color: #8b4513;
            font-style: italic;
            font-size: 1.2rem;
            margin-top: 50px;
        }
        
        @media (max-width: 768px) {
            .notes-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .main-content {
                padding: 20px;
            }
        }
        
        /* Miglioramenti per dispositivi molto piccoli */
        @media (max-width: 360px) {
            body {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 1.6rem;
            }
            
            .main-content {
                padding: 10px;
            }
            
            .btn {
                font-size: 0.8rem;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Blocknote</h1>
            <p>Le tue note con stile retrò</p>
        </div>
        
        <div class="main-content">
            <!-- Vista principale delle note -->
            <div id="notesView">
                <button class="btn btn-primary" onclick="showEditor()">✍️ Crea Nuova Nota</button>
                
                <div id="notesContainer">
                    <div class="empty-state">
                        Nessuna nota ancora creata.<br>
                        Clicca su "Crea Nuova Nota" per iniziare!
                    </div>
                </div>
            </div>
            
            <!-- Editor delle note -->
            <div id="editorView" class="editor-container">
                <div style="margin-bottom: 15px;">
                    <input type="text" id="noteTitle" placeholder="Titolo della nota..." 
                           style="width: 100%; padding: 12px; border: 2px solid #d2b48c; border-radius: 8px; 
                                  font-family: 'Crimson Text', serif; font-size: 1.2rem; font-weight: 600; 
                                  background: #fff9e6; color: #8b4513;">
                </div>
                
                <div class="editor-toolbar">
                    <button class="toolbar-btn" onclick="formatText('bold')" title="Grassetto">
                        <strong>B</strong>
                    </button>
                    <button class="toolbar-btn" onclick="formatText('italic')" title="Corsivo">
                        <em>I</em>
                    </button>
                    <button class="toolbar-btn" onclick="formatText('underline')" title="Sottolineato">
                        <u>U</u>
                    </button>
                    <button class="toolbar-btn" onclick="formatText('foreColor', 'red')" title="Colore Rosso" style="color: red;">
                        🎨 Rosso
                    </button>
                </div>
                
                <div id="editor" class="editor-content" contenteditable="true" placeholder="Scrivi la tua nota qui...">
                </div>
                
                <div class="editor-actions">
                    <button class="btn btn-primary" onclick="saveNote()">💾 Salva</button>
                    <button class="btn" onclick="cancelEdit()">❌ Annulla</button>
                    <button class="btn" onclick="goHome()">🏠 Home</button>
                </div>
            </div>
            
            <!-- Vista singola nota -->
            <div id="viewNoteModal" class="editor-container">
                <div style="margin-bottom: 20px;">
                    <h2 id="viewNoteTitle" style="color: #8b4513; font-size: 1.8rem; margin-bottom: 15px; 
                                                   border-bottom: 2px solid #d2b48c; padding-bottom: 10px;"></h2>
                    <div id="viewNoteContent" style="background: white; border: 2px solid #d2b48c; 
                                                     border-radius: 10px; padding: 20px; min-height: 300px; 
                                                     font-size: 1.1rem; line-height: 1.6;"></div>
                    <div style="margin-top: 15px; font-style: italic; color: #8b4513;">
                        <div id="viewNoteDates"></div>
                    </div>
                </div>
                
                <div class="editor-actions">
                    <button class="btn btn-primary" onclick="editFromView()">✏️ Modifica</button>
                    <button class="btn btn-danger" onclick="deleteFromView()">🗑️ Elimina</button>
                    <button class="btn" onclick="goHome()">🏠 Home</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let notes = [];
        let editingIndex = -1;
        let viewingIndex = -1;

        // Carica le note dal localStorage
        function loadNotes() {
            try {
                const savedNotes = localStorage.getItem('vintageNotes');
                if (savedNotes) {
                    notes = JSON.parse(savedNotes);
                }
            } catch (e) {
                console.error('Errore nel caricamento delle note:', e);
                notes = [];
            }
        }

        // Salva le note nel localStorage
        function saveNotesToStorage() {
            try {
                localStorage.setItem('vintageNotes', JSON.stringify(notes));
            } catch (e) {
                console.error('Errore nel salvataggio delle note:', e);
                alert('Errore nel salvataggio delle note!');
            }
        }

        function showEditor(index = -1) {
            editingIndex = index;
            hideAllViews();
            document.getElementById('editorView').style.display = 'block';
            
            const titleInput = document.getElementById('noteTitle');
            const editor = document.getElementById('editor');
            
            if (index >= 0) {
                titleInput.value = notes[index].title || '';
                editor.innerHTML = notes[index].content || '';
            } else {
                titleInput.value = '';
                editor.innerHTML = '';
            }
            titleInput.focus();
        }

        function hideAllViews() {
            document.getElementById('notesView').style.display = 'none';
            document.getElementById('editorView').style.display = 'none';
            document.getElementById('viewNoteModal').style.display = 'none';
        }

        function goHome() {
            hideAllViews();
            document.getElementById('notesView').style.display = 'block';
            editingIndex = -1;
            viewingIndex = -1;
        }

        function cancelEdit() {
            if (confirm('Sei sicuro di voler annullare? Le modifiche non salvate andranno perse.')) {
                goHome();
            }
        }

        // Funzione per gestire i click sui pulsanti
        function handleButtonClick(event, callback) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            if (typeof callback === 'function') {
                callback();
            }
        }

        function formatText(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('editor').focus();
        }

        function saveNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('editor').innerHTML.trim();
            
            if (!title) {
                alert('Il titolo è obbligatorio!');
                document.getElementById('noteTitle').focus();
                return;
            }
            
            if (!content || content === '<br>' || content === '<div><br></div>') {
                alert('Il contenuto della nota non può essere vuoto!');
                document.getElementById('editor').focus();
                return;
            }

            const note = {
                id: editingIndex >= 0 ? notes[editingIndex].id : Date.now(),
                title: title,
                content: content,
                createdAt: editingIndex >= 0 ? notes[editingIndex].createdAt : new Date().toLocaleString('it-IT'),
                updatedAt: new Date().toLocaleString('it-IT')
            };

            if (editingIndex >= 0) {
                notes[editingIndex] = note;
            } else {
                notes.unshift(note);
            }

            saveNotesToStorage();
            renderNotes();
            goHome();
            
            alert(editingIndex >= 0 ? 'Nota aggiornata con successo!' : 'Nota salvata con successo!');
        }

        function viewNote(index) {
            viewingIndex = index;
            hideAllViews();
            document.getElementById('viewNoteModal').style.display = 'block';
            
            const note = notes[index];
            document.getElementById('viewNoteTitle').textContent = note.title;
            document.getElementById('viewNoteContent').innerHTML = note.content;
            document.getElementById('viewNoteDates').innerHTML = `
                Creata: ${note.createdAt}
                ${note.updatedAt !== note.createdAt ? `<br>Modificata: ${note.updatedAt}` : ''}
            `;
        }

        function editFromView() {
            showEditor(viewingIndex);
        }

        function deleteFromView() {
            if (confirm('Sei sicuro di voler eliminare questa nota?')) {
                notes.splice(viewingIndex, 1);
                saveNotesToStorage();
                renderNotes();
                goHome();
            }
        }

        function deleteNote(index) {
            if (confirm('Sei sicuro di voler eliminare questa nota?')) {
                notes.splice(index, 1);
                saveNotesToStorage();
                renderNotes();
            }
        }

        function editNote(index) {
            showEditor(index);
        }

        function getPreviewText(html) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            const text = tempDiv.textContent || tempDiv.innerText || '';
            return text.length > 100 ? text.substring(0, 100) + '...' : text;
        }

        function renderNotes() {
            const container = document.getElementById('notesContainer');
            
            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        Nessuna nota ancora creata.<br>
                        Clicca su "Crea Nuova Nota" per iniziare!
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="notes-grid">
                    ${notes.map((note, index) => `
                        <div class="note-card">
                            <div class="note-title">${note.title}</div>
                            <div class="note-preview">${getPreviewText(note.content)}</div>
                            <small style="color: #8b4513; font-style: italic; display: block; margin-bottom: 10px;">
                                Creata: ${note.createdAt}
                                ${note.updatedAt !== note.createdAt ? `<br>Modificata: ${note.updatedAt}` : ''}
                            </small>
                            <div class="note-actions">
                                <button class="btn" onclick="viewNote(${index})" style="font-size: 0.9rem;">👁️ Apri</button>
                                <button class="btn" onclick="editNote(${index})" style="font-size: 0.9rem;">✏️ Modifica</button>
                                <button class="btn btn-danger" onclick="deleteNote(${index})" style="font-size: 0.9rem;">🗑️ Elimina</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Inizializza l'app
        loadNotes();
        renderNotes();

        // Gestione placeholder per l'editor
        document.getElementById('editor').addEventListener('focus', function() {
            if (this.innerHTML === '') {
                this.innerHTML = '';
            }
        });

        document.getElementById('editor').addEventListener('blur', function() {
            if (this.innerHTML.trim() === '' || this.innerHTML === '<br>') {
                this.innerHTML = '';
            }
        });
    </script>
