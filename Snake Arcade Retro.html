<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Arcade Retro</title>
    
    <style>
        body {
            background-color: #0f172a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #game-container {
            position: relative;
            border: 4px solid #334155;
            background-color: #020617;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            touch-action: none;
            max-width: 100%;
        }

        canvas { display: block; }

        .ui-panel {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            font-size: 10px;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .btn-start {
            margin-top: 20px;
            padding: 15px 30px;
            background: #22c55e;
            border: none;
            color: white;
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            border-radius: 4px;
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 8px;
            color: #64748b;
            text-align: center;
            line-height: 1.5;
        }
    
        #overlay-title {
            font-size: 24px;
            color: #22c55e;
            margin-bottom: 16px;
            text-align: center;
        }
        #overlay-title.game-over { color: #ef4444 !important; }
        #overlay-msg {
            font-size: 10px;
            color: #94a3b8;
            text-align: center;
            padding: 0 16px;
            margin-bottom: 20px;
        }
</style>
</head>
<body>
    <div class="ui-panel">
        <div>SCORE: <span id="score">0</span></div>
        <div>BEST: <span id="high-score">0</span></div>
    </div>

    <div id="game-container">
        <canvas id="snakeCanvas"></canvas>
        <div id="overlay">
            <h1 id="overlay-title">SNAKE RETRO</h1>
            <p id="overlay-msg">TRASCINA (SWIPE) PER MUOVERTI</p>
            <button id="start-btn" class="btn-start">GIOCA</button>
            <div class="controls-hint">SCORRI IN ALTO, BASSO, DESTRA O SINISTRA</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayMsg = document.getElementById('overlay-msg');

        let gridSize, tileCountX, tileCountY;
        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 0; let dy = 0;
        let nextDx = 0; let nextDy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let speed = 150;

        function setupCanvas() {
            const padding = 20;
            const uiHeight = 80;
            let availableWidth = Math.min(window.innerWidth - padding, 600);
            let availableHeight = Math.min(window.innerHeight - uiHeight, 600);
            gridSize = 20; 
            canvas.width = Math.floor(availableWidth / gridSize) * gridSize;
            canvas.height = Math.floor(availableHeight / gridSize) * gridSize;
            tileCountX = canvas.width / gridSize;
            tileCountY = canvas.height / gridSize;
            highScoreEl.innerText = highScore;
        }

        function initGame() {
            const startX = Math.floor(tileCountX / 2);
            const startY = Math.floor(tileCountY / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX, y: startY + 1 },
                { x: startX, y: startY + 2 }
            ];
            dx = 0; dy = -1;
            nextDx = 0; nextDy = -1;
            score = 0; speed = 150;
            scoreEl.innerText = score;
            spawnFood();
            overlay.style.display = 'none';
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, speed);
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * tileCountX);
            food.y = Math.floor(Math.random() * tileCountY);
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) spawnFood();
            });
        }

        function draw() {
            dx = nextDx; dy = nextDy;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= tileCountX || head.y < 0 || head.y >= tileCountY) return gameOver();
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) return gameOver();
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.innerText = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                spawnFood();
                if (speed > 70) {
                    clearInterval(gameLoop);
                    speed -= 2;
                    gameLoop = setInterval(draw, speed);
                }
            } else {
                snake.pop();
            }

            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ef4444';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ef4444';
            ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);
            ctx.shadowBlur = 0;

            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#22c55e' : '#166534';
                ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        function gameOver() {
            clearInterval(gameLoop);
            overlayTitle.innerText = "GAME OVER";
            overlayTitle.classList.add("game-over");
            overlayMsg.innerText = `PUNTEGGIO: ${score}`;
            startBtn.innerText = "RIPROVA";
            overlay.style.display = 'flex';
        }

        window.addEventListener('keydown', e => {
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'w', 'a', 's', 'd', 'W', 'A', 'S', 'D'].includes(e.key)) {
                if(overlay.style.display === 'none') e.preventDefault();
            }
            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W': if (dy !== 1) { nextDx = 0; nextDy = -1; } break;
                case 'ArrowDown': case 's': case 'S': if (dy !== -1) { nextDx = 0; nextDy = 1; } break;
                case 'ArrowLeft': case 'a': case 'A': if (dx !== 1) { nextDx = -1; nextDy = 0; } break;
                case 'ArrowRight': case 'd': case 'D': if (dx !== -1) { nextDx = 1; nextDy = 0; } break;
            }
        }, { passive: false });

        let touchStartX = null; let touchStartY = null;

        document.addEventListener('touchstart', e => {
            if(e.target.tagName.toLowerCase() === 'button') return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        document.addEventListener('touchmove', e => {
            if (overlay.style.display === 'none' && e.target === canvas) e.preventDefault();
            if (!touchStartX || !touchStartY) return;

            const touchMoveX = e.touches[0].clientX;
            const touchMoveY = e.touches[0].clientY;
            const deltaX = touchMoveX - touchStartX;
            const deltaY = touchMoveY - touchStartY;

            if (Math.abs(deltaX) > 20 || Math.abs(deltaY) > 20) {
                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    if (deltaX > 0 && dx !== -1) { nextDx = 1; nextDy = 0; }
                    else if (deltaX < 0 && dx !== 1) { nextDx = -1; nextDy = 0; }
                } else {
                    if (deltaY > 0 && dy !== -1) { nextDx = 0; nextDy = 1; }
                    else if (deltaY < 0 && dy !== 1) { nextDx = 0; nextDy = -1; }
                }
                touchStartX = touchMoveX; touchStartY = touchMoveY;
            }
        }, { passive: false });

        document.addEventListener('touchend', e => { touchStartX = null; touchStartY = null; }, { passive: false });

        startBtn.addEventListener('click', initGame);
        window.addEventListener('load', setupCanvas);
        window.addEventListener('resize', setupCanvas);
    </script>
</body>
</html>
