<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Quaderno PDF a Righe (Selettivo)</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Are+You+Serious&family=Caveat+Brush&family=Caveat:wght@400..700&family=Handlee&family=Indie+Flower&family=Reenie+Beanie&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --paper-bg: #fafafa;
      --line-color: #91D1D3;
      --margin-color: #D44147;
      --hole-color: #575450;
    }
    body {
      margin: 0;
      background: #4e7d7f;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .toolbar {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    .paper {
      position: relative;
      width: 100%;
      max-width: 800px;
      height: 800px; 
      background: var(--paper-bg);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border-radius: 4px;
      overflow: hidden;
    }
    .paper:before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 60px;
      background: radial-gradient(var(--hole-color) 6px, transparent 7px) repeat-y;
      background-size: 30px 30px;
      background-position: 15px 15px;
      border-right: 2px solid var(--margin-color);
      z-index: 10;
      pointer-events: none;
    }
    .paper-content {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 60px;
      /* Ripristinato il background a singole righe orizzontali */
      background: linear-gradient(transparent 29px, var(--line-color) 29px);
      background-size: 30px 30px;
      padding-top: 30px;
    }
    
    #editor {
      width: 100%;
      height: 100%;
      line-height: 30px; 
      padding: 0 20px;
      border: 0;
      outline: 0;
      background: transparent;
      color: #1a237e;
      font-family: 'Handlee', cursive;
      font-size: 20px;
      box-sizing: border-box;
      white-space: pre-wrap;
      overflow-y: auto;
    }
    
    #editor:empty:before {
      content: attr(data-placeholder);
      color: #999;
      pointer-events: none;
    }

    button {
      padding: 8px 15px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      font-weight: bold;
    }
    .btn-pdf { background: #d32f2f; color: white; }
    .btn-clear { background: #666; color: white; }
    input[type="number"] { width: 50px; padding: 2px 5px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <div>
      <label>Font:</label>
      <select id="fontFamily" onchange="applyFont()">
      <option value="'Handlee', cursive">Handlee</option>
        <option value="'Caveat', cursive">Caveat</option>
        <option value="'Indie Flower', cursive">Indie Flower</option>
        <option value="'Reenie Beanie'", cursive;>Reenie Beanie</option>
       <option value= "'Are You Serious'", cursive;>Are You Serious</option>
      <option value="'Caveat Brush'", cursive;>Caveat Brush</option>
      </select>
    </div>
    <div>
      <label>Grandezza:</label>
      <input type="number" id="fontSize" value="20" min="12" max="50" step="2" onchange="applySize()"> px
    </div>
    <div>
      <label>Colore:</label>
      <input type="color" id="penColor" value="#1a237e" oninput="applyColor()" onchange="applyColor()">
    </div>
    <button class="btn-clear" onclick="clearAll()">Pulisci</button>
    <button class="btn-pdf" id="btnExport" onclick="generatePDF()">Esporta PDF a Righe</button>
  </div>

  <div class="paper" id="printable-area">
    <div class="paper-content">
      <div id="editor" contenteditable="true" data-placeholder="Evidenzia una parte di testo e usa i controlli in alto per cambiarne lo stile..."></div>
    </div>
  </div>

  <script>
    const editor = document.getElementById('editor');
    let savedRange = null;

    // All'avvio della pagina forziamo il cursore nell'editor
    window.onload = () => { editor.focus(); };

    // Salva in memoria la selezione
    document.addEventListener('selectionchange', () => {
      const selection = window.getSelection();
      if (selection.rangeCount > 0 && editor.contains(selection.anchorNode)) {
        savedRange = selection.getRangeAt(0);
      }
    });

    // Ripristina la selezione per non perdere il focus
    function restoreSelection() {
      if (!savedRange) return false;
      editor.focus(); 
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(savedRange);
      return true;
    }

    function applyFont() {
      if(restoreSelection()) {
        const font = document.getElementById('fontFamily').value;
        document.execCommand('fontName', false, font);
      }
    }

    function applyColor() {
      if(restoreSelection()) {
        const color = document.getElementById('penColor').value;
        document.execCommand('foreColor', false, color);
      }
    }

    function applySize() {
      if(!restoreSelection()) return; 
      
      const size = document.getElementById('fontSize').value;
      document.execCommand("fontSize", false, "7");
      
      const elements = editor.querySelectorAll("font[size='7']");
      elements.forEach(el => {
        el.removeAttribute("size");
        el.style.fontSize = size + "px";
      });
    }

    function clearAll() {
      if(confirm("Cancellare tutto?")) {
        editor.innerHTML = "";
      }
    }

    async function generatePDF() {
      const btn = document.getElementById('btnExport');
      const originalText = btn.innerText;
      btn.innerText = "Generazione in corso...";
      btn.disabled = true;

      const element = document.getElementById('printable-area');

      try {
        const canvas = await html2canvas(element, { 
          scale: 2, 
          useCORS: true 
        });
        
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        
        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        pdf.save("quaderno_a_righe.pdf");
      } catch (error) {
        alert("Errore durante la generazione del PDF.");
        console.error(error);
      } finally {
        btn.innerText = originalText;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
