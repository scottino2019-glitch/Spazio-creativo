
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Master - Sfida a Livelli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective { perspective: 1000px; }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .card-back { transform: rotateY(180deg); }
        
        /* Animazione per il completamento del livello */
        @keyframes success-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .level-complete { animation: success-pop 0.5s ease-out; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-4 font-sans">

    <!-- Header & Stats -->
    <div class="w-full max-w-2xl mb-6 flex flex-col gap-4">
        <div class="flex justify-between items-center bg-slate-800 p-4 rounded-2xl shadow-xl">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">Memory Master</h1>
                <p class="text-slate-400 text-sm" id="level-display">Livello 1</p>
            </div>
            <div class="flex gap-4 text-center">
                <div>
                    <p class="text-xs text-slate-500 uppercase">Mosse</p>
                    <p class="text-xl font-mono" id="moves-count">0</p>
                </div>
                <div>
                    <p class="text-xs text-slate-500 uppercase">Tempo</p>
                    <p class="text-xl font-mono" id="timer">00:00</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Board Container -->
    <div id="game-container" class="w-full max-w-2xl flex-grow flex items-center justify-center">
        <div id="game-board" class="grid gap-3 w-full max-h-[70vh]">
            <!-- Cards will be generated here -->
        </div>
    </div>

    <!-- UI Overlays -->
    <div id="overlay" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden p-6">
        <div class="bg-slate-800 p-8 rounded-3xl text-center max-w-sm w-full border border-slate-700 shadow-2xl">
            <h2 id="overlay-title" class="text-3xl font-bold mb-2">Grande!</h2>
            <p id="overlay-message" class="text-slate-400 mb-6">Livello completato in 12 mosse.</p>
            <button id="next-btn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-colors text-lg">
                Prossimo Livello
            </button>
        </div>
    </div>

    <script>
        const gameBoard = document.getElementById('game-board');
        const movesDisplay = document.getElementById('moves-count');
        const timerDisplay = document.getElementById('timer');
        const levelDisplay = document.getElementById('level-display');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayMessage = document.getElementById('overlay-message');
        const nextBtn = document.getElementById('next-btn');

        // Emoji set for game content
        const icons = ["🍎", "🍋", "🍒", "🥝", "🍉", "🍇", "🫐", "🍍", "🥑", "🥕", "🍕", "🍔", "🍦", "🍩", "🍪", "🍭", "⚽", "🏀", "🎾", "🎮", "🚀", "🛸", "🌈", "🔥", "💎", "👻", "🤖", "🐱", "🐶", "🐼", "🦊", "🦁"];

        let currentLevel = 1;
        let moves = 0;
        let timeElapsed = 0;
        let timerInterval;
        let flippedCards = [];
        let matchedPairs = 0;
        let canFlip = true;

        // Configurazione livelli: [colonne, righe]
        const levelConfigs = [
            [2, 2], // 1: 4 cards
            [3, 2], // 2: 6 cards
            [4, 2], // 3: 8 cards
            [3, 4], // 4: 12 cards
            [4, 4], // 5: 16 cards
            [5, 4], // 6: 20 cards
            [6, 4], // 7: 24 cards
            [6, 5], // 8: 30 cards
            [6, 6]  // 9: 36 cards
        ];

        function initGame() {
            const config = levelConfigs[Math.min(currentLevel - 1, levelConfigs.length - 1)];
            const cols = config[0];
            const rows = config[1];
            const totalCards = cols * rows;
            const pairsNeeded = totalCards / 2;

            // Reset state
            moves = 0;
            timeElapsed = 0;
            matchedPairs = 0;
            flippedCards = [];
            canFlip = true;
            movesDisplay.innerText = moves;
            levelDisplay.innerText = `Livello ${currentLevel} (${cols}x${rows})`;
            clearInterval(timerInterval);
            startTimer();

            // Prepare cards
            let levelIcons = [...icons].sort(() => 0.5 - Math.random()).slice(0, pairsNeeded);
            let gameSet = [...levelIcons, ...levelIcons].sort(() => 0.5 - Math.random());

            // Build Grid
            gameBoard.innerHTML = '';
            gameBoard.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            
            gameSet.forEach((icon, index) => {
                const card = createCard(icon, index);
                gameBoard.appendChild(card);
            });
        }

        function createCard(icon, index) {
            const container = document.createElement('div');
            container.className = 'perspective aspect-square';
            
            const inner = document.createElement('div');
            inner.className = 'card-inner';
            inner.dataset.icon = icon;
            inner.dataset.index = index;

            const front = document.createElement('div');
            front.className = 'card-front bg-slate-700 border-2 border-slate-600 text-2xl';
            front.innerHTML = '<div class="w-4 h-4 bg-slate-500 rounded-full opacity-30"></div>';

            const back = document.createElement('div');
            back.className = 'card-back bg-slate-100 text-4xl sm:text-5xl';
            back.innerText = icon;

            inner.appendChild(front);
            inner.appendChild(back);
            container.appendChild(inner);

            inner.addEventListener('click', () => handleCardClick(inner));
            
            return container;
        }

        function handleCardClick(card) {
            if (!canFlip || card.classList.contains('flipped') || flippedCards.includes(card)) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                movesDisplay.innerText = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;
            const match = card1.dataset.icon === card2.dataset.icon;

            if (match) {
                matchedPairs++;
                flippedCards = [];
                canFlip = true;
                
                // Effetto successo visivo
                setTimeout(() => {
                    card1.parentElement.classList.add('level-complete');
                    card2.parentElement.classList.add('level-complete');
                }, 300);

                const config = levelConfigs[Math.min(currentLevel - 1, levelConfigs.length - 1)];
                if (matchedPairs === (config[0] * config[1]) / 2) {
                    endLevel();
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        function startTimer() {
            timerDisplay.innerText = "00:00";
            timerInterval = setInterval(() => {
                timeElapsed++;
                const mins = Math.floor(timeElapsed / 60).toString().padStart(2, '0');
                const secs = (timeElapsed % 60).toString().padStart(2, '0');
                timerDisplay.innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function endLevel() {
            clearInterval(timerInterval);
            setTimeout(() => {
                overlayTitle.innerText = "Ottimo Lavoro!";
                overlayMessage.innerText = `Livello ${currentLevel} completato in ${moves} mosse e ${timerDisplay.innerText}.`;
                overlay.classList.remove('hidden');
            }, 600);
        }

        nextBtn.addEventListener('click', () => {
            currentLevel++;
            overlay.classList.add('hidden');
            initGame();
        });

        // Avvio iniziale
        window.onload = initGame;
    </script>
</body>
</html>
