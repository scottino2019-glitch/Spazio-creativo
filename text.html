<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Voce - App TTS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center p-6 antialiased selection:bg-purple-300 selection:text-purple-900">

  <!-- Contenitore Glassmorphism -->
  <div class="max-w-lg w-full bg-white/90 backdrop-blur-xl shadow-[0_20px_50px_rgba(8,_112,_184,_0.3)] rounded-[2.5rem] p-8 border border-white/50 relative overflow-hidden transition-all">

    <!-- Decorazioni sfocate sullo sfondo della card -->
    <div class="absolute -top-10 -right-10 w-40 h-40 bg-gradient-to-br from-pink-400 to-orange-400 rounded-full mix-blend-multiply filter blur-2xl opacity-40"></div>
    <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-gradient-to-br from-indigo-400 to-purple-400 rounded-full mix-blend-multiply filter blur-2xl opacity-40"></div>

    <div class="relative z-10">
      <!-- Intestazione -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-violet-500 to-fuchsia-500 text-white text-3xl shadow-lg shadow-violet-500/40 mb-4 transform -rotate-6 hover:rotate-0 transition-transform duration-300">
          🎙️
        </div>
        <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-violet-700 to-fuchsia-700">Studio Voce</h2>
        <p class="text-slate-600 font-medium mt-2">Crea file audio per le tue lezioni di lingua</p>
      </div>

      <!-- Selezione Lingua -->
      <div class="mb-5">
        <label class="block text-sm font-bold text-slate-700 mb-2 ml-2 uppercase tracking-wide">Seleziona Lingua</label>
        <div class="relative">
          <select id="languageSelector" class="w-full appearance-none border-2 border-white bg-white/60 hover:bg-white focus:bg-white rounded-2xl p-4 text-slate-700 font-bold shadow-sm focus:border-violet-400 focus:ring-4 focus:ring-violet-400/20 transition-all outline-none cursor-pointer">
            <option value="it">🇮🇹 Italiano</option>
            <option value="en">🇬🇧 Inglese</option>
            <option value="zh-CN">🇨🇳 Cinese (Mandarino)</option>
            <option value="ko">🇰🇷 Coreano</option>
            <option value="ja">🇯🇵 Giapponese</option>
            <option value="ar">🇸🇦 Arabo</option>
            <option value="ru">🇷🇺 Russo</option>
            <option value="hi">🇮🇳 Hindi</option>
            <option value="tr">🇹🇷 Turco</option>
          </select>
          <!-- Freccina personalizzata -->
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
            <svg class="fill-current h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
              <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Area Testo -->
      <div class="mb-8">
        <label class="block text-sm font-bold text-slate-700 mb-2 ml-2 uppercase tracking-wide">Testo da leggere</label>
        <textarea id="textInput" rows="4" class="w-full border-2 border-white bg-white/60 hover:bg-white focus:bg-white rounded-2xl p-4 text-slate-800 font-medium shadow-sm focus:border-violet-400 focus:ring-4 focus:ring-violet-400/20 transition-all outline-none resize-none placeholder:text-slate-400" placeholder="Incolla qui la frase o il vocabolo..."></textarea>
      </div>

      <!-- Pulsanti -->
      <div class="flex flex-col sm:flex-row gap-4">
        <button id="playBtn" class="flex-1 bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-indigo-500/30 transform hover:-translate-y-1 hover:scale-[1.02] transition-all duration-200 flex justify-center items-center gap-2 group">
          <span class="group-hover:scale-125 transition-transform duration-300">▶️</span> Ascolta
        </button>
        <button id="downloadBtn" class="flex-1 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-emerald-500/30 transform hover:-translate-y-1 hover:scale-[1.02] transition-all duration-200 flex justify-center items-center gap-2 group">
          <span class="group-hover:-translate-y-1 transition-transform duration-300">💾</span> Scarica MP3
        </button>
      </div>
    </div>
  </div>

  <script>
    // Crea l'URL usando googleapis.com per evitare blocchi su Vercel
    function buildGoogleUrl() {
      const text = document.getElementById('textInput').value.trim();
      const lang = document.getElementById('languageSelector').value;
      if (!text) {
        alert("Inserisci del testo per generare l'audio!");
        return null;
      }
      return `https://translate.googleapis.com/translate_tts?ie=UTF-8&client=gtx&tl=${lang}&q=${encodeURIComponent(text)}`;
    }

    // --- RIPRODUZIONE AUDIO ---
    document.getElementById('playBtn').addEventListener('click', () => {
      const url = buildGoogleUrl();
      if (!url) return;
      
      const btn = document.getElementById('playBtn');
      btn.classList.add('animate-pulse');
      setTimeout(() => btn.classList.remove('animate-pulse'), 1000);

      // Riproduzione immediata
      const audio = new Audio(url);
      audio.play().catch(e => alert("Errore di riproduzione: " + e.message));
    });

    // --- DOWNLOAD SICURO ---
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const url = buildGoogleUrl();
      if (!url) return;

      const lang = document.getElementById('languageSelector').value;
      
      // Crea un link temporaneo e forza l'apertura
      const link = document.createElement('a');
      link.href = url;
      link.target = "_blank"; // Apre in una nuova scheda senza rompere l'app
      link.download = `Audio_${lang}_${Date.now()}.mp3`;
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // Mostra un piccolo avviso per guidare l'utente
      alert("Se il file non si scarica automaticamente, si aprirà un player audio in una nuova scheda. Clicca sui 3 puntini e seleziona 'Scarica'!");
    });
  </script>
</body>
</html>
