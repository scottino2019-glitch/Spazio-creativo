!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomy Pro: Full Body Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg-main: #050508;
            --panel: #0f0f16;
            --accent: #8b5cf6;
            --border: #1e1e2e;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: #e2e8f0;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Preview Engine */
        .preview-pane {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(rgba(30, 30, 46, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 30, 46, 0.5) 1px, transparent 1px);
            background-size: 40px 40px;
            position: relative;
            background-color: #08080c;
        }

        .animal-canvas {
            position: relative;
            width: 500px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Editor Styles */
        .editor-pane {
            width: 550px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: -15px 0 40px rgba(0,0,0,0.6);
        }

        .code-area {
            font-family: 'Fira Code', monospace;
            background: #08080b;
            color: #a5b4fc;
            padding: 1.5rem;
            font-size: 12px;
            line-height: 1.5;
            flex: 1;
            resize: none;
            outline: none;
            border: none;
            scrollbar-width: thin;
            scrollbar-color: #312e81 transparent;
        }

        .label-tag {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            padding: 12px 20px;
            background: rgba(139, 92, 246, 0.05);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        .btn-action {
            padding: 12px 24px;
            font-size: 11px;
            font-weight: 800;
            background: var(--accent);
            color: white;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-action:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        /* Contenitore Parti */
        .part { position: absolute; }
    </style>
</head>
<body>

    <!-- Area Anteprima -->
    <main class="preview-pane">
        <div class="absolute top-8 left-8">
            <h2 class="text-[10px] font-black text-slate-600 uppercase tracking-[0.3em]">Full Anatomy Rendering</h2>
        </div>

        <div class="animal-canvas" id="canvas-root">
            <!-- Struttura Gerarchica Completa -->
            
            <!-- Tail (Back Layer) -->
            <div class="part tail"></div>

            <!-- Legs -->
            <div class="part leg leg-l"></div>
            <div class="part leg leg-r"></div>

            <!-- Arms -->
            <div class="part arm arm-l"></div>
            <div class="part arm arm-r"></div>

            <!-- Body -->
            <div class="part body"></div>

            <!-- Head & Features -->
            <div class="part head">
                <div class="part ear ear-l"></div>
                <div class="part ear ear-r"></div>
                <div class="part eyebrow eye-br-l"></div>
                <div class="part eyebrow eye-br-r"></div>
                <div class="part eye eye-l"><div class="pupil"></div></div>
                <div class="part eye eye-r"><div class="pupil"></div></div>
                <div class="part snout">
                    <div class="part nose"></div>
                    <div class="part mouth"></div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-8 right-8 text-right">
            <p class="text-[10px] text-slate-500 font-mono">Engine: CSS3 / HTML5</p>
            <p class="text-[10px] text-slate-700 font-mono">Responsive Anatomy v2.0</p>
        </div>
    </main>

    <!-- Area Editor -->
    <aside class="editor-pane">
        <div class="p-6 border-b border-slate-800 bg-slate-900/20">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-violet-500 animate-pulse"></div>
                <h1 class="text-xs font-black text-white uppercase tracking-widest">Anatomy Blueprint Studio</h1>
            </div>
        </div>

        <div class="label-tag">
            <span>Global Stylesheet</span>
            <span class="text-slate-500">Live Injector</span>
        </div>
        <textarea id="css-editor" class="code-area" spellcheck="false"></textarea>

        <div class="p-6 bg-[#08080c] border-t border-slate-800 flex flex-col gap-4">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Esempi Anatomici</span>
                <div class="flex gap-2">
                    <button onclick="loadPreset('creatura')" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 rounded text-[9px] font-black tracking-tighter">CREATURA</button>
                    <button onclick="loadPreset('felino')" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 rounded text-[9px] font-black tracking-tighter">FELINO</button>
                </div>
            </div>
            <button onclick="copyCode()" class="btn-action w-full">Copia Blueprint CSS</button>
        </div>
    </aside>

    <style id="dynamic-style"></style>

    <script>
        const cssEditor = document.getElementById('css-editor');
        const styleTag = document.getElementById('dynamic-style');

        const presets = {
            creatura: `/* MASTER ANATOMY: CREATURA ANTROPOMORFA */

:root {
  --skin: #4ade80;
  --skin-dark: #166534;
  --accent: #facc15;
}

/* --- TRONCO E ARTI --- */
.body {
  width: 140px;
  height: 180px;
  background: var(--skin-dark);
  border-radius: 50% 50% 40% 40%;
  top: 250px;
  z-index: 5;
}

.arm {
  width: 30px;
  height: 120px;
  background: var(--skin);
  border-radius: 15px;
  top: 260px;
}
.arm-l { left: 140px; transform: rotate(15deg); }
.arm-r { right: 140px; transform: rotate(-15deg); }

.leg {
  width: 40px;
  height: 100px;
  background: var(--skin-dark);
  border-radius: 20px;
  top: 410px;
}
.leg-l { left: 170px; }
.leg-r { right: 170px; }

/* --- TESTA E DETTAGLI --- */
.head {
  width: 120px;
  height: 130px;
  background: var(--skin);
  border-radius: 45% 45% 40% 40%;
  top: 140px;
  z-index: 10;
}

.ear {
  width: 30px;
  height: 60px;
  background: var(--skin-dark);
  border-radius: 50% 50% 0 0;
  top: -20px;
}
.ear-l { left: 10px; transform: rotate(-20deg); }
.ear-r { right: 10px; transform: rotate(20deg); }

.eye {
  width: 25px;
  height: 25px;
  background: white;
  border-radius: 50%;
  top: 40px;
}
.eye-l { left: 20px; }
.eye-r { right: 20px; }

.pupil {
  width: 10px;
  height: 10px;
  background: #000;
  border-radius: 50%;
  margin: 7px;
}

.snout {
  width: 60px;
  height: 40px;
  background: rgba(0,0,0,0.1);
  border-radius: 30px;
  bottom: 20px;
  left: 30px;
}

.nose {
  width: 15px;
  height: 10px;
  background: #064e3b;
  border-radius: 50%;
  top: 5px;
  left: 22px;
}

.mouth {
  width: 30px;
  height: 5px;
  background: #064e3b;
  border-radius: 10px;
  bottom: 10px;
  left: 15px;
}

.tail {
  width: 100px;
  height: 30px;
  background: var(--skin-dark);
  border-radius: 20px;
  bottom: 200px;
  left: 100px;
  transform: rotate(-45deg);
  z-index: 1;
}`,

            felino: `/* MASTER ANATOMY: FELINO (GATTO/PANTERA) */

:root {
  --fur: #1e293b;
  --fur-light: #334155;
  --eyes: #bef264;
}

.body {
  width: 180px;
  height: 140px;
  background: var(--fur);
  border-radius: 50%;
  top: 260px;
}

.head {
  width: 110px;
  height: 100px;
  background: var(--fur);
  border-radius: 50%;
  top: 190px;
  z-index: 10;
}

.ear {
  width: 40px;
  height: 40px;
  background: var(--fur);
  border-radius: 5px;
  top: -15px;
  transform: rotate(45deg);
}
.ear-l { left: 10px; }
.ear-r { right: 10px; }

.eye {
  width: 30px;
  height: 18px;
  background: var(--eyes);
  border-radius: 50% 50% 40% 40%;
  top: 35px;
}
.eye-l { left: 15px; }
.eye-r { right: 15px; }

.snout {
  width: 40px;
  height: 30px;
  bottom: 15px;
  left: 35px;
}

.nose {
  width: 12px;
  height: 8px;
  background: #fb7185;
  border-radius: 50%;
  left: 14px;
}

.leg {
  width: 35px;
  height: 80px;
  background: var(--fur-light);
  border-radius: 15px;
}
.leg-l { top: 350px; left: 170px; }
.leg-r { top: 350px; right: 170px; }

.tail {
  width: 120px;
  height: 15px;
  background: var(--fur);
  border-radius: 10px;
  bottom: 240px;
  right: 80px;
  transform: rotate(30deg);
  z-index: 1;
}`
        };

        function update() {
            styleTag.textContent = cssEditor.value;
        }

        function loadPreset(name) {
            cssEditor.value = presets[name];
            update();
        }

        function copyCode() {
            cssEditor.select();
            document.execCommand('copy');
            // User feedback
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "COPIATO!";
            btn.style.background = "#10b981";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "";
            }, 2000);
        }

        cssEditor.addEventListener('input', update);
        window.onload = () => loadPreset('creatura');
    </script>
</body>
</html>
